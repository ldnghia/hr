name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

env:
  NODE_VERSION: '20'

jobs:
  build:
    name: Build & Test
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: 7d
          BCRYPT_SALT_ROUNDS: 4
          PORT: 3001
        run: npm test -- --passWithNoTests

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Pull & build in project directory
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd /home/phamhai/hr/hr_project
          git pull origin main
          cd backend
          npm ci
          npx prisma generate
          npx prisma migrate deploy
          npm run build

      - name: Restart PM2
        run: |
          pm2 restart hr-backend || pm2 start /home/phamhai/hr/hr_project/backend/dist/src/main.js --name hr-backend
          pm2 save
